# ===========================================
# Development Override (macOS)
# ===========================================
# This file is automatically loaded by docker-compose
# and overrides settings for local development on macOS.
#
# For Ubuntu production, rename or delete this file.
# On Ubuntu: mv docker-compose.override.yml docker-compose.override.yml.bak
# ===========================================

services:
  # Backend: Use internal CUPS on macOS (socket path differs from Ubuntu)
  backend:
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/logs:/app/logs
      # macOS: Don't mount host socket, use internal CUPS
      - cups_data:/etc/cups
      - cups_spool:/var/spool/cups
    ports:
      - "3000:3000"
      - "631:631"  # Expose internal CUPS for development
    environment:
      NODE_ENV: development

  # Frontend: For quick JS changes, build locally and copy
  # Or use the helper script: ./dev.sh frontend
  frontend:
    # If you want live development with Vite:
    # 1. Stop the frontend container: docker-compose stop frontend
    # 2. Run locally: cd frontend && npm run dev
    # 3. Access at http://localhost:5173 (proxies API to backend)
    build:
      context: ./frontend
      dockerfile: Dockerfile
